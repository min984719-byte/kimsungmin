<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>한국어 ↔ 베트남어 번역기 — SYNOPEX VIETNAM</title>
<style>
:root{
  --bg:#0f1923;--bg2:#16232f;--bg3:#1d2f3e;
  --blue:#2176AE;--teal:#1D9E75;--red:#C00000;
  --txt1:#e8f4fd;--txt2:#94afc8;--txt3:#5a7a96;
  --border:#1e3448;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt1);font-family:'Malgun Gothic',Arial,sans-serif;min-height:100vh}

.hdr{background:#1F3864;padding:0 20px;height:54px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.hdr h1{font-size:15px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--txt2);margin-top:2px}

.wrap{max-width:1100px;margin:0 auto;padding:20px}

/* 번역 박스 */
.trans-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.trans-side{display:flex;flex-direction:column}
.side-hdr{padding:10px 16px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.side-hdr.ko{background:rgba(0,52,120,.3)}
.side-hdr.vi{background:rgba(218,37,29,.15)}
textarea{width:100%;min-height:140px;resize:vertical;background:transparent;border:none;outline:none;color:var(--txt1);font-size:14px;line-height:1.7;font-family:inherit;padding:14px 16px}
textarea::placeholder{color:var(--txt3)}
.side-foot{padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);font-size:11px;cursor:pointer;font-family:inherit}
.btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.primary{background:var(--blue);color:#fff;border-color:var(--blue);font-weight:700}
.btn.primary:hover{opacity:.85}
.cnt{font-size:10px;color:var(--txt3);margin-left:auto}

/* 중앙 버튼 */
.mid{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:0 8px;border-left:1px solid var(--border);border-right:1px solid var(--border);background:var(--bg3);min-width:52px}
.btn-swap{width:36px;height:36px;border-radius:50%;background:var(--blue);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.btn-swap:hover{opacity:.8;transform:rotate(180deg);transition:.3s}
.btn-dir{writing-mode:vertical-rl;padding:8px 4px;font-size:10px;font-weight:700;background:var(--teal);border:none;color:#fff;border-radius:6px;cursor:pointer;letter-spacing:1px}
.btn-dir.vi{background:#da251d}

/* 사전 */
.sec-title{font-size:12px;font-weight:700;color:var(--txt2);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'●';color:var(--blue);font-size:7px}
.search{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--txt1);padding:9px 14px;border-radius:8px;font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}
.search:focus{border-color:var(--blue)}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat{padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--txt2);font-size:11px;cursor:pointer;font-family:inherit}
.cat.on,.cat:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:13px;cursor:pointer}
.card:hover,.card.on{border-left-color:var(--blue);background:var(--bg3)}
.card-ko{font-size:13px;font-weight:700;margin-bottom:4px}
.card-vi{font-size:12px;color:#3dd68c;margin-bottom:6px}
.card-cat{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;background:rgba(33,118,174,.2);color:#4A9FD4}

/* 상세 */
.detail{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:20px;display:none}
.detail.show{display:block}
.detail-top{display:flex;justify-content:space-between;margin-bottom:14px}
.detail-ko{font-size:20px;font-weight:700}
.detail-vi{font-size:16px;color:#3dd68c;margin-top:4px}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.detail-body{grid-template-columns:1fr}}
.dsec{background:var(--bg3);border-radius:8px;padding:12px}
.dsec-t{font-size:10px;font-weight:700;color:var(--txt2);margin-bottom:8px;text-transform:uppercase}
.dsec p{font-size:12px;line-height:1.8;color:var(--txt2)}
.dsec b{color:var(--txt1)}
.ex{margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.ex:last-child{border:none;margin:0;padding:0}
.ex-ko{font-size:12px}
.ex-vi{font-size:12px;color:#3dd68c}
.btn-x{background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer}

.toast{position:fixed;bottom:20px;right:20px;background:var(--bg3);border:1px solid var(--teal);color:#3dd68c;padding:9px 16px;border-radius:8px;font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
.spinner{display:none;width:8px;height:8px;border-radius:50%;background:var(--teal);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>

var curCat = '전체';
var curIdx = -1;

// ── 번역 핵심 함수 ──
function doTranslate(srcId, tgtId) {
  var srcEl = document.getElementById(srcId);
  var tgtEl = document.getElementById(tgtId);
  var spinEl = document.getElementById('spinner');
  var srcLang = srcId === 'ta-ko' ? 'ko' : 'vi';
  var src = srcEl.value.trim();

  if (!src) {
    srcEl.focus();
    srcEl.style.outline = '2px solid #C00000';
    setTimeout(function() { srcEl.style.outline = ''; }, 1500);
    toast('텍스트를 입력하세요');
    return;
  }

  tgtEl.value = '⏳ 번역 중...';
  if (spinEl) spinEl.style.display = 'inline-block';

  var payload = JSON.stringify({
    mode: 'translate',
    text: src,
    src_lang: srcLang,
    tgt_lang: srcLang === 'ko' ? 'vi' : 'ko'
  });

  fetch(LAMBDA, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: payload
  })
  .then(function(res) {
    return res.text().then(function(txt) {
      return { status: res.status, txt: txt };
    });
  })
  .then(function(obj) {
    if (spinEl) spinEl.style.display = 'none';
    if (obj.status === 200) {
      var data = JSON.parse(obj.txt);
      tgtEl.value = data.result || obj.txt;
      updateCnt(tgtId === 'ta-ko' ? 'cnt-ko' : 'cnt-vi', tgtEl.value.length);
      toast('번역 완료! ✅');
    } else {
      tgtEl.value = '❌ 오류 (HTTP ' + obj.status + ')\n' + obj.txt;
    }
  })
  .catch(function(err) {
    if (spinEl) spinEl.style.display = 'none';
    tgtEl.value = '❌ ' + err.message;
  });
}

function updateCnt(id, n) {
  var el = document.getElementById(id);
  if (el) el.textContent = n + '자';
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

// ── 사전 ──
function getCats() {
  var cats = ['전체'];
  DICT.forEach(function(d) { if (cats.indexOf(d.cat) < 0) cats.push(d.cat); });
  return cats;
}

function renderCats() {
  var el = document.getElementById('cats');
  el.innerHTML = getCats().map(function(c) {
    return '<button class="cat' + (c === curCat ? ' on' : '') + '" data-cat="' + c + '">' + c + '</button>';
  }).join('');
}

function renderGrid() {
  var q = document.getElementById('search').value.trim().toLowerCase();
  var el = document.getElementById('grid');
  var filtered = DICT.filter(function(d, i) {
    var catOk = curCat === '전체' || d.cat === curCat;
    var qOk = !q || d.ko.toLowerCase().includes(q) || d.vi.toLowerCase().includes(q);
    return catOk && qOk;
  });
  if (!filtered.length) {
    el.innerHTML = '<div style="color:var(--txt3);font-size:12px;padding:10px">검색 결과 없음</div>';
    return;
  }
  el.innerHTML = filtered.map(function(d) {
    var i = DICT.indexOf(d);
    return '<div class="card' + (i === curIdx ? ' on' : '') + '" data-idx="' + i + '">'
      + '<div class="card-ko">' + d.ko + '</div>'
      + '<div class="card-vi">' + d.vi + '</div>'
      + '<span class="card-cat">' + d.cat + '</span>'
      + '</div>';
  }).join('');
}

function showDetail(idx) {
  var d = DICT[idx];
  curIdx = idx;
  document.getElementById('d-ko').textContent = d.ko;
  document.getElementById('d-vi').textContent = d.vi;
  var body = '<div class="dsec"><div class="dsec-t">🇰🇷 한국어 설명</div><p>' + d.defKo
    + (d.formula ? '<br><br><b>계산식:</b> ' + d.formula : '') + '</p></div>'
    + '<div class="dsec"><div class="dsec-t">🇻🇳 Giải thích</div><p>' + d.defVi + '</p></div>';
  if (d.ex && d.ex.length) {
    body += '<div class="dsec" style="grid-column:1/-1"><div class="dsec-t">💬 예문</div>'
      + d.ex.map(function(e) {
          return '<div class="ex"><div class="ex-ko">🇰🇷 ' + e.ko + '</div><div class="ex-vi">🇻🇳 ' + e.vi + '</div></div>';
        }).join('') + '</div>';
  }
  document.getElementById('d-body').innerHTML = body;
  document.getElementById('detail').classList.add('show');
  renderGrid();
}

// ── 이벤트 연결 ──
window.addEventListener('load', function() {

  // 번역 버튼
  document.getElementById('btn-trans-ko').addEventListener('click', function() { doTranslate('ta-ko', 'ta-vi'); });
  document.getElementById('btn-trans-vi').addEventListener('click', function() { doTranslate('ta-vi', 'ta-ko'); });
  document.getElementById('btn-dir-ko').addEventListener('click', function() { doTranslate('ta-ko', 'ta-vi'); });
  document.getElementById('btn-dir-vi').addEventListener('click', function() { doTranslate('ta-vi', 'ta-ko'); });

  // 스왑
  document.getElementById('btn-swap').addEventListener('click', function() {
    var ko = document.getElementById('ta-ko').value;
    var vi = document.getElementById('ta-vi').value;
    document.getElementById('ta-ko').value = vi;
    document.getElementById('ta-vi').value = ko;
    updateCnt('cnt-ko', vi.length);
    updateCnt('cnt-vi', ko.length);
  });

  // 지우기/복사
  document.getElementById('btn-clear-ko').addEventListener('click', function() { document.getElementById('ta-ko').value = ''; updateCnt('cnt-ko', 0); });
  document.getElementById('btn-clear-vi').addEventListener('click', function() { document.getElementById('ta-vi').value = ''; updateCnt('cnt-vi', 0); });
  document.getElementById('btn-copy-ko').addEventListener('click', function() {
    var v = document.getElementById('ta-ko').value;
    if (v) navigator.clipboard.writeText(v).then(function() { toast('복사됨!'); });
  });
  document.getElementById('btn-copy-vi').addEventListener('click', function() {
    var v = document.getElementById('ta-vi').value;
    if (v) navigator.clipboard.writeText(v).then(function() { toast('복사됨!'); });
  });

  // 글자수
  document.getElementById('ta-ko').addEventListener('input', function() { updateCnt('cnt-ko', this.value.length); });
  document.getElementById('ta-vi').addEventListener('input', function() { updateCnt('cnt-vi', this.value.length); });

  // Ctrl+Enter
  document.getElementById('ta-ko').addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') doTranslate('ta-ko', 'ta-vi');
  });
  document.getElementById('ta-vi').addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') doTranslate('ta-vi', 'ta-ko');
  });

  // 사전 카테고리
  document.getElementById('cats').addEventListener('click', function(e) {
    if (e.target.dataset.cat) {
      curCat = e.target.dataset.cat;
      renderCats();
      renderGrid();
    }
  });

  // 사전 검색
  document.getElementById('search').addEventListener('input', renderGrid);

  // 카드 클릭
  document.getElementById('grid').addEventListener('click', function(e) {
    var card = e.target.closest('.card');
    if (card) showDetail(parseInt(card.dataset.idx));
  });

  // 상세 닫기
  document.getElementById('btn-detail-close').addEventListener('click', function() {
    document.getElementById('detail').classList.remove('show');
    curIdx = -1;
    renderGrid();
  });

  // 초기 렌더
  renderCats();
  renderGrid();
});
</script>
</body>
</html>
