<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>한국어 ↔ 베트남어 번역기 — SYNOPEX VIETNAM</title>
<style>
:root{
  --bg:#0f1923; --bg2:#16232f; --bg3:#1d2f3e; --bg4:#243648;
  --blue1:#1F3864; --blue2:#2176AE; --blue3:#4A9FD4;
  --teal1:#0d5c46; --teal2:#1D9E75; --teal3:#3dd68c;
  --amber2:#E8A020; --red2:#C00000; --red3:#ff6b6b;
  --purple2:#7B2FBE; --purple3:#b57bee;
  --txt1:#e8f4fd; --txt2:#94afc8; --txt3:#5a7a96;
  --border:#1e3448; --shadow:0 4px 24px rgba(0,0,0,.5);
  --vn:#da251d; /* 베트남 빨강 */
  --kr:#003478; /* 한국 파랑 */
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt1);font-family:'Malgun Gothic','맑은 고딕',sans-serif;min-height:100vh}

/* 헤더 */
.hdr{
  background:linear-gradient(135deg,var(--blue1) 0%,#0a1520 100%);
  border-bottom:1px solid var(--border);
  padding:0 24px; height:58px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow)
}
.hdr-title{display:flex;align-items:center;gap:12px}
.hdr-title h1{font-size:16px;font-weight:700}
.hdr-title .sub{font-size:11px;color:var(--txt2);margin-top:2px}
.flag{font-size:22px}
.hdr-right{display:flex;align-items:center;gap:8px}
.badge-kr{background:var(--kr);color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}
.badge-vn{background:var(--vn);color:#fff;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700}

/* 메인 레이아웃 */
.wrap{max-width:1200px;margin:0 auto;padding:24px 20px}

/* 번역 패널 */
.trans-panel{
  display:grid;grid-template-columns:1fr 56px 1fr;
  gap:0;margin-bottom:28px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;box-shadow:var(--shadow)
}
.lang-header{
  padding:12px 18px;display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;border-bottom:1px solid var(--border)
}
.lang-header.ko{background:linear-gradient(90deg,rgba(0,52,120,.4),transparent)}
.lang-header.vi{background:linear-gradient(90deg,rgba(218,37,29,.2),transparent)}
.lang-dot-ko{width:10px;height:10px;border-radius:50%;background:var(--kr);flex-shrink:0}
.lang-dot-vi{width:10px;height:10px;border-radius:50%;background:var(--vn);flex-shrink:0}
.textarea-wrap{padding:14px}
.trans-textarea{
  width:100%;min-height:130px;resize:vertical;
  background:transparent;border:none;outline:none;
  color:var(--txt1);font-size:14px;line-height:1.7;
  font-family:'Malgun Gothic','맑은 고딕',sans-serif
}
.trans-textarea::placeholder{color:var(--txt3)}
.trans-result{
  width:100%;min-height:130px;padding:0;
  background:transparent;border:none;
  color:var(--teal3);font-size:14px;line-height:1.7;
  font-family:'Malgun Gothic','맑은 고딕',sans-serif;
  white-space:pre-wrap;cursor:pointer
}
.trans-result:hover{color:var(--blue3)}

/* 중앙 스왑 버튼 */
.swap-col{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:var(--bg3)
}
.btn-swap{
  width:38px;height:38px;border-radius:50%;
  background:var(--blue2);border:none;color:#fff;
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:.2s
}
.btn-swap:hover{background:var(--blue3);transform:rotate(180deg)}
.btn-trans{
  padding:8px 0;width:42px;
  background:var(--teal2);border:none;color:#fff;
  font-size:10px;font-weight:700;cursor:pointer;border-radius:6px;
  transition:.2s;writing-mode:vertical-rl;letter-spacing:1px
}
.btn-trans:hover{background:var(--teal3)}

/* 하단 버튼 */
.trans-actions{
  padding:10px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap
}
.trans-actions-r{
  padding:10px 18px;border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px
}
.btn-sm{
  padding:5px 12px;border-radius:6px;border:1px solid var(--border);
  background:var(--bg3);color:var(--txt2);font-size:11px;cursor:pointer;
  font-family:inherit;transition:.15s
}
.btn-sm:hover{background:var(--bg4);color:var(--txt1)}
.btn-sm.primary{background:var(--blue2);color:#fff;border-color:var(--blue2)}
.btn-sm.primary:hover{background:var(--blue3)}
.char-count{font-size:10px;color:var(--txt3)}

/* 섹션 타이틀 */
.sec-title{
  font-size:12px;font-weight:700;color:var(--txt2);
  margin-bottom:12px;display:flex;align-items:center;gap:6px
}
.sec-title::before{content:'●';color:var(--blue2);font-size:8px}

/* 사전 카드 그리드 */
.dict-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:10px;margin-bottom:28px
}
.dict-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;padding:14px;cursor:pointer;
  transition:.2s;border-left:3px solid transparent
}
.dict-card:hover{border-left-color:var(--blue2);background:var(--bg3)}
.dict-card.active{border-left-color:var(--teal2);background:var(--bg3)}
.dict-kw{font-size:13px;font-weight:700;color:var(--txt1);margin-bottom:4px}
.dict-vi{font-size:12px;color:var(--teal3);margin-bottom:6px}
.dict-cat{
  display:inline-block;padding:2px 7px;border-radius:8px;
  font-size:10px;font-weight:600;
  background:rgba(33,118,174,.2);color:var(--blue3)
}

/* 단어 상세 패널 */
.detail-panel{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:20px;margin-bottom:28px;
  display:none
}
.detail-panel.show{display:block}
.detail-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.detail-ko{font-size:22px;font-weight:700;color:var(--txt1)}
.detail-vi{font-size:18px;color:var(--teal3);margin-top:4px;font-weight:600}
.detail-cats{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.detail-cat{
  padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;
  background:rgba(33,118,174,.2);color:var(--blue3)
}
.detail-body{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.detail-body{grid-template-columns:1fr}}
.detail-section{background:var(--bg3);border-radius:8px;padding:12px}
.detail-section-title{font-size:10px;font-weight:700;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.detail-section p{font-size:12px;line-height:1.8;color:var(--txt2)}
.detail-section b{color:var(--txt1)}
.example-row{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.example-row:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.example-ko{font-size:12px;color:var(--txt1);margin-bottom:2px}
.example-vi{font-size:12px;color:var(--teal3)}
.btn-close{background:none;border:none;color:var(--txt2);font-size:18px;cursor:pointer;padding:4px}
.btn-close:hover{color:var(--txt1)}

/* 검색바 */
.search-bar{
  display:flex;gap:10px;margin-bottom:16px;align-items:center;flex-wrap:wrap
}
.search-input{
  flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);
  color:var(--txt1);padding:9px 14px;border-radius:8px;font-size:13px;
  font-family:inherit;outline:none
}
.search-input:focus{border-color:var(--blue2)}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap}
.cat-btn{
  padding:5px 12px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--txt2);font-size:11px;cursor:pointer;
  font-family:inherit;transition:.15s
}
.cat-btn:hover,.cat-btn.on{background:var(--blue2);color:#fff;border-color:var(--blue2)}

/* 즐겨찾기 */
.fav-section{margin-bottom:28px}
.fav-chips{display:flex;gap:7px;flex-wrap:wrap}
.fav-chip{
  padding:5px 12px;border-radius:20px;
  background:rgba(123,47,190,.2);border:1px solid rgba(123,47,190,.4);
  color:var(--purple3);font-size:11px;cursor:pointer;transition:.15s
}
.fav-chip:hover{background:rgba(123,47,190,.35)}
.fav-empty{font-size:12px;color:var(--txt3)}

/* 토스트 */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--bg3);border:1px solid var(--teal2);
  color:var(--teal3);padding:10px 18px;border-radius:8px;
  font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:999
}
.toast.show{opacity:1}

/* AI 번역 상태 */
.ai-status{
  display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt3)
}
.ai-dot{width:6px;height:6px;border-radius:50%;background:var(--teal2);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.loading-dots::after{content:'.';animation:dots 1.2s infinite}
@keyframes dots{0%{content:'.'} 33%{content:'..'} 66%{content:'...'} 100%{content:'.'}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">
    <span class="flag">🌏</span>
    <div>
      <h1>한국어 ↔ 베트남어 번역기</h1>
      <div class="sub">SYNOPEX VIETNAM | 생산현장 전문용어 포함</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="badge-kr">🇰🇷 한국어</span>
    <span style="color:var(--txt3);font-size:12px">↔</span>
    <span class="badge-vn">🇻🇳 Tiếng Việt</span>
  </div>
</div>

<div class="wrap">

  <!-- 번역 입력 패널 -->
  <div class="trans-panel">
    <!-- 한국어 입력 -->
    <div>
      <div class="lang-header ko">
        <span class="lang-dot-ko"></span>
        <span>한국어</span>
        <span style="font-size:10px;color:var(--txt3);font-weight:400;margin-left:auto">Korean</span>
      </div>
      <div class="textarea-wrap">
        <textarea id="txt-ko" class="trans-textarea" placeholder="번역할 한국어를 입력하세요...
예) 공정별 가동율 현황을 확인해 주세요." oninput="onInput('ko')" onkeydown="if(event.ctrlKey&&event.key==='Enter')translate('ko')"></textarea>
      </div>
      <div class="trans-actions">
        <button class="btn-sm" onclick="clearText('ko')">✕ 지우기</button>
        <button class="btn-sm" onclick="copyText('ko')">📋 복사</button>
        <button class="btn-sm" onclick="pasteText('ko')">📥 붙여넣기</button>
        <span class="char-count" id="cnt-ko">0자</span>
      </div>
    </div>

    <!-- 스왑 -->
    <div class="swap-col">
      <button class="btn-trans" onclick="translate('ko')" title="한→베">KR→VN</button>
      <button class="btn-swap" onclick="swapLang()" title="언어 전환 (swap)">⇄</button>
      <button class="btn-trans" onclick="translate('vi')" style="background:var(--vn)" title="베→한">VN→KR</button>
    </div>

    <!-- 베트남어 결과 -->
    <div>
      <div class="lang-header vi">
        <span class="lang-dot-vi"></span>
        <span>Tiếng Việt</span>
        <span style="font-size:10px;color:var(--txt3);font-weight:400;margin-left:auto">Vietnamese</span>
      </div>
      <div class="textarea-wrap">
        <textarea id="txt-vi" class="trans-textarea" placeholder="Nhập tiếng Việt để dịch sang tiếng Hàn...
또는 번역 결과가 여기에 표시됩니다." oninput="onInput('vi')"></textarea>
      </div>
      <div class="trans-actions">
        <button class="btn-sm" onclick="clearText('vi')">✕ 지우기</button>
        <button class="btn-sm" onclick="copyText('vi')">📋 복사</button>
        <div id="ai-status" class="ai-status" style="display:none;margin-left:auto">
          <span class="ai-dot"></span><span>AI 번역 중<span class="loading-dots"></span></span>
        </div>
        <button class="btn-sm primary" onclick="translate('vi')" style="margin-left:auto">🚀 번역 실행</button>
      </div>
    </div>
  </div>

  <!-- 즐겨찾기 -->
  <div class="fav-section">
    <div class="sec-title">⭐ 최근 검색 / 즐겨찾기</div>
    <div class="fav-chips" id="fav-chips">
      <span class="fav-empty">단어를 즐겨찾기하면 여기에 표시됩니다.</span>
    </div>
  </div>

  <!-- 단어 상세 패널 -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-top">
      <div>
        <div class="detail-ko" id="d-ko"></div>
        <div class="detail-vi" id="d-vi"></div>
        <div class="detail-cats" id="d-cats"></div>
      </div>
      <div style="display:flex;gap:6px;align-items:flex-start">
        <button class="btn-sm" id="d-fav-btn" onclick="toggleFav()">☆ 즐겨찾기</button>
        <button class="btn-close" onclick="closeDetail()">✕</button>
      </div>
    </div>
    <div class="detail-body" id="d-body"></div>
  </div>

  <!-- 사전 검색 -->
  <div class="sec-title">📖 전문용어 사전  <span style="font-weight:400;font-size:10px;color:var(--txt3)">(단어 클릭 시 상세 설명)</span></div>
  <div class="search-bar">
    <input type="text" class="search-input" id="search-input"
      placeholder="🔍 단어 검색 (한국어 또는 베트남어)..."
      oninput="filterDict()">
    <div class="cat-filter" id="cat-filter"></div>
  </div>
  <div class="dict-grid" id="dict-grid"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const LAMBDA = 'https://bssy4msokyy3hvsphelxiuyzta0nwxml.lambda-url.ap-southeast-1.on.aws/';

// ══════════════════════════════════════════════════════════
// 전문 용어 사전 데이터
// ══════════════════════════════════════════════════════════
const DICT = [
  // 생산관리
  {ko:'가동율',      vi:'Tỷ lệ hoạt động',   cat:'생산관리',
   def_ko:'설비가 실제로 가동된 시간의 비율. 기준시간 대비 실가동시간',

     {ko:'공정별 가동율을 확인해 주세요.',vi:'Vui lòng kiểm tra tỷ lệ hoạt động theo công đoạn.'},

   ]},
  {ko:'공정계획',    vi:'Kế hoạch công đoạn', cat:'생산관리',
   def_ko:'각 공정에 배포되는 일별/주별 생산 투입 계획량',
   def_vi:'Kế hoạch sản xuất theo ngày/tuần được phân phối cho từng công đoạn',
   formula:'공정투입량 = 납품목표(PNL) × 라우팅(1/0) − 재공(WIP)',
   examples:[
     {ko:'공정계획을 오전 중으로 배포해 주세요.',vi:'Vui lòng phân phối kế hoạch công đoạn trước buổi sáng.'},
   ]},
  {ko:'납기일',      vi:'Ngày giao hàng',     cat:'납품/출하',
   def_ko:'고객에게 제품을 납품해야 하는 기한',

   ]},

     {ko:'현재 동도금 공정 재공이 몇 패널입니까?',vi:'Hiện tại có bao nhiêu panel tồn kho trong công đoạn mạ đồng?'},

     {ko:'레이저 공정 CAPA가 부족합니다.',vi:'Năng lực sản xuất của công đoạn laser không đủ.'},

  {ko:'부하율',      vi:'Tỷ lệ tải',          cat:'생산관리',

   def_vi:'Công đoạn có tỷ lệ tải vượt 100%, trở thành điểm nghẽn của dòng sản xuất',

     {ko:'이번 주 NECK 공정은 수가접입니다.',vi:'Công đoạn NECK tuần này là hàn tay.'},
   ]},
  {ko:'우선순위',    vi:'Thứ tự ưu tiên',      cat:'생산계획',

   def_vi:'Thứ tự khẩn cấp dựa trên ngày giao hàng. Phương pháp EDD (Ngày đến hạn sớm nhất) là cơ bản',
   formula:'우선순위 = RANK(D-Day, 오름차순)',
   examples:[
     {ko:'우선순위 1번 모델을 먼저 투입해 주세요.',vi:'Vui lòng đưa vào sản xuất model có thứ tự ưu tiên số 1 trước.'},

const CATS = [...new Set(DICT.map(d=>d.cat))];
let curCat = '전체';
let curDetail = null;
let favs = JSON.parse(localStorage.getItem('trans_favs')||'[]');

// ── 카테고리 필터 렌더 ──
function renderCats(){
  const wrap = document.getElementById('cat-filter');
  wrap.innerHTML = ['전체',...CATS].map(c=>
    `<button class="cat-btn${c===curCat?' on':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}
function setCat(cat){ curCat=cat; renderCats(); filterDict(); }

// ── 사전 렌더 ──
function filterDict(){
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const grid = document.getElementById('dict-grid');
  const filtered = DICT.filter(d=>{
    const catOk = curCat==='전체' || d.cat===curCat;
    const qOk = !q || d.ko.toLowerCase().includes(q) || d.vi.toLowerCase().includes(q);
    return catOk && qOk;
  });
  grid.innerHTML = filtered.map((d,i)=>`
    <div class="dict-card${curDetail&&curDetail.ko===d.ko?' active':''}"
         onclick="showDetail(${DICT.indexOf(d)})">
      <div class="dict-kw">${highlight(d.ko,q)}</div>
      <div class="dict-vi">${highlight(d.vi,q)}</div>
      <span class="dict-cat">${d.cat}</span>
    </div>`
  ).join('') || '<div style="color:var(--txt3);font-size:12px;padding:10px">검색 결과가 없습니다.</div>';
}
function highlight(text, q){
  if(!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return text.replace(re,'<mark style="background:rgba(33,118,174,.35);color:var(--blue3);border-radius:2px">$1</mark>');
}

// ── 단어 상세 ──
function showDetail(idx){
  const d = DICT[idx];
  curDetail = d;
  document.getElementById('d-ko').textContent = d.ko;
  document.getElementById('d-vi').textContent = d.vi;
  document.getElementById('d-cats').innerHTML =
    `<span class="detail-cat">${d.cat}</span>`;

  const favBtn = document.getElementById('d-fav-btn');
  favBtn.textContent = favs.includes(d.ko) ? '★ 즐겨찾기됨' : '☆ 즐겨찾기';
  favBtn.style.color = favs.includes(d.ko) ? 'var(--amber2)' : '';

  let body = `
    <div class="detail-section">
      <div class="detail-section-title">🇰🇷 한국어 설명</div>
      <p>${d.def_ko||'—'}</p>
      ${d.formula?`<p style="margin-top:8px"><b>계산식:</b> ${d.formula}</p>`:''}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">🇻🇳 Giải thích tiếng Việt</div>
      <p>${d.def_vi||'—'}</p>
    </div>`;
  if(d.examples && d.examples.length){
    body += `
    <div class="detail-section" style="grid-column:1/-1">
      <div class="detail-section-title">💬 예문 / Ví dụ</div>
      ${d.examples.map(e=>`
        <div class="example-row">
          <div class="example-ko">🇰🇷 ${e.ko}</div>
          <div class="example-vi">🇻🇳 ${e.vi}</div>
        </div>`).join('')}
    </div>`;
  }
  document.getElementById('d-body').innerHTML = body;
  document.getElementById('detail-panel').classList.add('show');
  // 스크롤
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
  // 카드 활성화 표시
  filterDict();
}
function closeDetail(){
  document.getElementById('detail-panel').classList.remove('show');
  curDetail=null; filterDict();
}

// ── 즐겨찾기 ──
function toggleFav(){
  if(!curDetail) return;
  const ko = curDetail.ko;
  if(favs.includes(ko)) favs = favs.filter(f=>f!==ko);
  else favs.unshift(ko);
  localStorage.setItem('trans_favs', JSON.stringify(favs));
  renderFavs();
  const favBtn = document.getElementById('d-fav-btn');
  favBtn.textContent = favs.includes(ko) ? '★ 즐겨찾기됨' : '☆ 즐겨찾기';
  favBtn.style.color = favs.includes(ko) ? 'var(--amber2)' : '';
  showToast(favs.includes(ko) ? '즐겨찾기에 추가됨' : '즐겨찾기 해제');
}
function renderFavs(){
  const wrap = document.getElementById('fav-chips');
  if(!favs.length){
    wrap.innerHTML='<span class="fav-empty">단어를 즐겨찾기하면 여기에 표시됩니다.</span>';
    return;
  }
  wrap.innerHTML = favs.map(f=>`
    <span class="fav-chip" onclick="quickSearch('${f}')">${f}</span>`
  ).join('');
}
function quickSearch(kw){
  document.getElementById('search-input').value = kw;
  filterDict();
  // 해당 단어 상세 열기
  const idx = DICT.findIndex(d=>d.ko===kw);
  if(idx>=0) showDetail(idx);
}

// ── 번역 기능 ──
function onInput(lang){
  const txt = document.getElementById(lang==='ko'?'txt-ko':'txt-vi');
  const val = txt.value||txt.textContent||'';
  document.getElementById('cnt-'+lang).textContent = val.length+'자';
}

async function translate(srcLang){
  var srcEl=document.getElementById(srcLang==="ko"?"txt-ko":"txt-vi");
  var tgtEl=document.getElementById(srcLang==="ko"?"txt-vi":"txt-ko");
  var src=(srcEl.value||"").trim();
  if(!src){showToast("번역할 텍스트를 입력하세요");return;}
  var statusEl=document.getElementById("ai-status");
  statusEl.style.display="flex";
  tgtEl.value=""; tgtEl.placeholder="번역 중...";
  var sysP="You are a Korean-Vietnamese translator specializing in FPCB manufacturing. Output only the translation.";
  var userP=srcLang==="ko"
    ?"다음 한국어를 베트남어로 번역하세요. 번역문만 출력:\n\n"+src
    :"다음 베트남어를 한국어로 번역하세요. 번역문만 출력:\n\n"+src;
  try{
    var res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,
        system:sysP,messages:[{role:"user",content:userP}]})
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    var data=await res.json();
    var result=data.content&&data.content[0]?data.content[0].text:"";
    if(result){tgtEl.value=result;showToast("번역 완료! ✅");onInput(srcLang==="ko"?"vi":"ko");}
    else throw new Error("빈 응답");
  }catch(e){
    fallbackTranslate(src,srcLang,tgtEl);
    console.error("번역오류:",e.message);
  }finally{
    statusEl.style.display="none";
    tgtEl.placeholder=srcLang==="ko"
      ?"Nhập tiếng Việt để dịch sang tiếng Hàn...\n또는 번역 결과가 여기에 표시됩니다."
      :"번역 결과가 여기에 표시됩니다.";
  }
}

function fallbackTranslate(src,srcLang,tgtEl){
  var result=src,found=[];
  DICT.forEach(function(d){
    if(srcLang==="ko"&&src.includes(d.ko)){result=result.split(d.ko).join(d.vi);found.push(d.ko+"→"+d.vi);}
    else if(srcLang==="vi"&&src.includes(d.vi)){result=result.split(d.vi).join(d.ko);found.push(d.vi+"→"+d.ko);}
  });
  if(found.length>0){
    tgtEl.value=result+"\n\n[사전기반 부분번역: "+found.join(", ")+"]";
    showToast("사전 기반 번역");
  }else{
    tgtEl.value="❌ 번역 오류\n아래 전문용어 사전에서 단어를 검색해 보세요.";
    showToast("번역 실패 — 사전을 이용하세요");
  }
  onInput(srcLang==="ko"?"vi":"ko");
}


function addRecent(text){
  // 사전에 없는 단어면 최근 검색에 칩으로 추가
  if(!favs.includes(text)){
    const recent = JSON.parse(sessionStorage.getItem('recent')||'[]');
    if(!recent.includes(text)) recent.unshift(text);
    sessionStorage.setItem('recent',JSON.stringify(recent.slice(0,5)));
  }
}

function swapLang(){
  const ko = document.getElementById('txt-ko').value;
  const vi = document.getElementById('txt-vi').value;
  document.getElementById('txt-ko').value = vi;
  document.getElementById('txt-vi').value = ko;
  onInput('ko'); onInput('vi');
}

function clearText(lang){
  document.getElementById('txt-'+lang).value='';
  document.getElementById('cnt-'+lang).textContent='0자';
}
async function pasteText(lang){
  try{
    const text = await navigator.clipboard.readText();
    document.getElementById('txt-ko').value = text;
    onInput('ko');
  } catch(e){ showToast('붙여넣기 권한이 필요합니다'); }
}
function copyText(lang){
  const v=document.getElementById('txt-'+lang).value;
  if(!v) return;
  navigator.clipboard.writeText(v).then(()=>showToast('복사됨!')).catch(()=>{});
}
function copyResult(){
  const v=document.getElementById('txt-vi').value;
  if(!v) return;
  navigator.clipboard.writeText(v).then(()=>showToast('결과 복사됨!')).catch(()=>{});
}

// ── 토스트 ──
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
}

// ── 초기화 ──
renderCats();
filterDict();
renderFavs();
</script>
