<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>한국어 ↔ 베트남어 번역기 — SYNOPEX VIETNAM</title>
<style>
:root{
  --bg:#0f1923;--bg2:#16232f;--bg3:#1d2f3e;--bg4:#243648;
  --blue:#2176AE;--blue3:#4A9FD4;
  --teal:#1D9E75;--teal3:#3dd68c;
  --red:#C00000;--vn:#da251d;--kr:#003478;
  --amber:#E8A020;--purple:#7B2FBE;
  --txt1:#e8f4fd;--txt2:#94afc8;--txt3:#5a7a96;
  --border:#1e3448;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt1);font-family:'Malgun Gothic',Arial,sans-serif;min-height:100vh}

/* 헤더 */
.hdr{
  background:linear-gradient(135deg,var(--kr) 0%,#0a1828 100%);
  padding:0 24px;height:58px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(0,0,0,.5)
}
.hdr-l{display:flex;align-items:center;gap:14px}
.hdr-title{font-size:16px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--txt2);margin-top:2px}
.flag-badge{padding:4px 12px;border-radius:14px;font-size:11px;font-weight:700}
.flag-ko{background:var(--kr);color:#fff}
.flag-vi{background:var(--vn);color:#fff}

/* 메인 레이아웃 */
.wrap{max-width:1300px;margin:0 auto;padding:28px 24px}

/* 번역 패널 — 크게 */
.trans-panel{
  display:grid;grid-template-columns:1fr 64px 1fr;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:16px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  margin-bottom:32px
}
.t-side{display:flex;flex-direction:column;min-height:320px}
.t-hdr{
  padding:14px 20px;display:flex;align-items:center;gap:10px;
  font-size:13px;font-weight:700;border-bottom:1px solid var(--border)
}
.t-hdr.ko{background:linear-gradient(90deg,rgba(0,52,120,.4),transparent)}
.t-hdr.vi{background:linear-gradient(90deg,rgba(218,37,29,.2),transparent)}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.dot-ko{background:var(--kr)}
.dot-vi{background:var(--vn)}
textarea{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--txt1);font-size:16px;line-height:1.8;
  font-family:'Malgun Gothic',Arial,sans-serif;
  padding:20px 22px;resize:none;min-height:260px
}
textarea::placeholder{color:var(--txt3);font-size:15px}
.t-foot{
  padding:12px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  background:var(--bg3)
}
.btn{
  padding:7px 16px;border-radius:7px;border:1px solid var(--border);
  background:var(--bg2);color:var(--txt2);font-size:12px;
  cursor:pointer;font-family:inherit;transition:.15s
}
.btn:hover{background:var(--bg4);color:var(--txt1)}
.btn.primary{
  background:var(--blue);color:#fff;border-color:var(--blue);
  font-weight:700;font-size:13px;padding:8px 20px
}
.btn.primary:hover{background:var(--blue3)}
.btn.pri-vn{background:var(--vn);border-color:var(--vn);color:#fff;font-weight:700;font-size:13px;padding:8px 20px}
.btn.pri-vn:hover{opacity:.85}
.cnt{font-size:11px;color:var(--txt3);margin-left:auto}
.spinner{
  display:none;width:8px;height:8px;border-radius:50%;
  background:var(--teal);animation:pulse 1s infinite;margin-left:6px
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* 중앙 */
.t-mid{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;
  border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:var(--bg3)
}
.btn-swap{
  width:44px;height:44px;border-radius:50%;
  background:var(--blue);border:none;color:#fff;
  font-size:20px;cursor:pointer;transition:.3s;
  display:flex;align-items:center;justify-content:center
}
.btn-swap:hover{transform:rotate(180deg);background:var(--blue3)}
.btn-dir{
  width:48px;padding:10px 0;font-size:10px;font-weight:700;
  border:none;color:#fff;border-radius:7px;cursor:pointer;
  writing-mode:vertical-rl;letter-spacing:1px;font-family:inherit
}
.btn-dir.ko{background:var(--blue)}
.btn-dir.vi{background:var(--vn)}
.btn-dir:hover{opacity:.8}

/* 단어 설명 패널 */
.explain-panel{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
  box-shadow:0 4px 20px rgba(0,0,0,.3)
}
.ep-hdr{
  padding:14px 20px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,rgba(29,158,117,.15),transparent)
}
.ep-hdr-l{display:flex;align-items:center;gap:10px}
.ep-title{font-size:13px;font-weight:700}
.ep-sub{font-size:11px;color:var(--txt2)}
.ep-body{padding:20px;min-height:200px}
.ep-input-row{display:flex;gap:10px;margin-bottom:16px}
.ep-input{
  flex:1;background:var(--bg3);border:1px solid var(--border);
  color:var(--txt1);padding:10px 14px;border-radius:8px;
  font-size:14px;font-family:inherit;outline:none
}
.ep-input:focus{border-color:var(--teal)}
.btn-explain{
  background:var(--teal);color:#fff;border:none;
  padding:10px 20px;border-radius:8px;font-size:13px;
  font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap
}
.btn-explain:hover{background:var(--teal3)}

/* 단어 결과 카드 */
.word-result{display:none}
.word-result.show{display:block}
.word-top{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px
}
.word-ko{font-size:24px;font-weight:700}
.word-vi{font-size:20px;color:var(--teal3);font-weight:600;margin-top:4px}
.word-ro{font-size:14px;color:var(--txt2);margin-top:4px}
.word-cats{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.wcat{
  padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;
  background:rgba(33,118,174,.2);color:var(--blue3)
}
.word-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:16px}
.wsec{background:var(--bg3);border-radius:10px;padding:14px}
.wsec-t{font-size:10px;font-weight:700;color:var(--txt2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.wsec p{font-size:13px;line-height:1.8;color:var(--txt2)}
.wsec b{color:var(--txt1)}
.wsec ul{padding-left:16px}
.wsec li{font-size:13px;color:var(--txt2);line-height:1.9;margin-bottom:2px}
.wsec li b{color:var(--txt1)}
.ex-row{padding:9px 0;border-bottom:1px solid var(--border)}
.ex-row:last-child{border:none;padding-bottom:0}
.ex-ko{font-size:13px;color:var(--txt1);margin-bottom:3px}
.ex-vi{font-size:13px;color:var(--teal3)}

/* 빠른 단어 버튼 */
.quick-words{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.qw{
  padding:5px 13px;border-radius:18px;border:1px solid var(--border);
  background:var(--bg3);color:var(--txt2);font-size:12px;cursor:pointer;
  font-family:inherit;transition:.15s
}
.qw:hover{background:rgba(29,158,117,.2);border-color:var(--teal);color:var(--teal3)}

/* 로딩/에러 */
.ep-loading{color:var(--txt2);font-size:13px;padding:20px 0;display:none}
.ep-loading.show{display:block}
.ep-error{color:var(--red);font-size:13px;padding:10px 0;display:none}
.ep-error.show{display:block}

/* 토스트 */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--bg3);border:1px solid var(--teal);
  color:var(--teal3);padding:10px 18px;border-radius:8px;
  font-size:12px;opacity:0;transition:.3s;pointer-events:none;z-index:999
}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <span style="font-size:26px">🌏</span>
    <div>
      <div class="hdr-title">한국어 ↔ 베트남어 번역기</div>
      <div class="hdr-sub">SYNOPEX VIETNAM | AI 번역 + 단어 세부 설명</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="flag-badge flag-ko">🇰🇷 한국어</span>
    <span style="color:var(--txt3)">↔</span>
    <span class="flag-badge flag-vi">🇻🇳 Tiếng Việt</span>
  </div>
</div>

<div class="wrap">

  <!-- ══ 번역 패널 ══ -->
  <div class="trans-panel">

    <!-- 한국어 -->
    <div class="t-side">
      <div class="t-hdr ko">
        <span class="dot dot-ko"></span>
        <span>한국어</span>
        <span style="font-size:11px;color:var(--txt3);font-weight:400;margin-left:auto">Korean</span>
      </div>
      <textarea id="ta-ko" placeholder="번역할 한국어를 입력하세요...

예) 공정별 가동율 현황을 확인해 주세요.
예) 이번 주 타발 공정 NECK이 발생했습니다."></textarea>
      <div class="t-foot">
        <button class="btn" id="btn-clear-ko">✕ 지우기</button>
        <button class="btn" id="btn-copy-ko">📋 복사</button>
        <span class="cnt" id="cnt-ko">0자</span>
        <button class="btn primary" id="btn-trans-ko">🚀 한 → 베 번역</button>
      </div>
    </div>

    <!-- 중앙 -->
    <div class="t-mid">
      <button class="btn-dir ko" id="btn-dir-ko">KR→VN</button>
      <button class="btn-swap" id="btn-swap" title="양쪽 텍스트 전환">⇄</button>
      <button class="btn-dir vi" id="btn-dir-vi">VN→KR</button>
    </div>

    <!-- 베트남어 -->
    <div class="t-side">
      <div class="t-hdr vi">
        <span class="dot dot-vi"></span>
        <span>Tiếng Việt</span>
        <span class="spinner" id="spinner"></span>
        <span style="font-size:11px;color:var(--txt3);font-weight:400;margin-left:auto">Vietnamese</span>
      </div>
      <textarea id="ta-vi" placeholder="Nhập tiếng Việt để dịch sang tiếng Hàn...

또는 번역 결과가 여기에 표시됩니다."></textarea>
      <div class="t-foot">
        <button class="btn" id="btn-clear-vi">✕ 지우기</button>
        <button class="btn" id="btn-copy-vi">📋 복사</button>
        <span class="cnt" id="cnt-vi">0자</span>
        <button class="btn pri-vn" id="btn-trans-vi">🚀 베 → 한 번역</button>
      </div>
    </div>

  </div>

  <!-- ══ 단어 세부 설명 패널 ══ -->
  <div class="explain-panel">
    <div class="ep-hdr">
      <div class="ep-hdr-l">
        <span style="font-size:20px">📖</span>
        <div>
          <div class="ep-title">베트남어 단어 세부 설명</div>
          <div class="ep-sub">단어를 입력하면 AI가 뜻·발음·예문·관련 표현을 상세히 설명합니다</div>
        </div>
      </div>
    </div>
    <div class="ep-body">

      <!-- 빠른 단어 -->
      <div style="font-size:11px;color:var(--txt2);margin-bottom:8px">자주 쓰는 단어:</div>
      <div class="quick-words" id="quick-words"></div>

      <!-- 입력 -->
      <div class="ep-input-row">
        <input class="ep-input" id="ep-input"
          placeholder="베트남어 또는 한국어 단어 입력 (예: Tỷ lệ hoạt động, 가동율, CAPA...)">
        <button class="btn-explain" id="btn-explain">🔍 단어 설명</button>
      </div>

      <!-- 로딩 -->
      <div class="ep-loading" id="ep-loading">⏳ AI가 단어를 분석 중입니다...</div>
      <div class="ep-error" id="ep-error"></div>

      <!-- 결과 -->
      <div class="word-result" id="word-result">
        <div class="word-top">
          <div>
            <div class="word-ko" id="wr-ko"></div>
            <div class="word-vi" id="wr-vi"></div>
            <div class="word-ro" id="wr-ro"></div>
            <div class="word-cats" id="wr-cats"></div>
          </div>
          <button class="btn" id="btn-result-copy">📋 설명 복사</button>
        </div>
        <div class="word-grid" id="wr-grid"></div>
        <div id="wr-examples"></div>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
var LAMBDA = 'https://bssy4msokyy3hvsphelxiuyzta0nwxml.lambda-url.ap-southeast-1.on.aws/';

// 빠른 단어 목록
var QUICK_WORDS = [
  'Tỷ lệ hoạt động','Mạ đồng','Dập khuôn','Công đoạn nút thắt',
  'Năng lực sản xuất','Kế hoạch','Nhân lực','Kiểm tra AOI',
  'Ngày giao hàng','Chi phí nhà thầu','가동율','NECK 공정','재공','타발'
];

// ── 유틸 ──
function toast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2200);
}
function updCnt(id,n){var el=document.getElementById(id);if(el)el.textContent=n+'자';}

// ── 번역 ──
function doTranslate(srcId, tgtId){
  var srcEl=document.getElementById(srcId);
  var tgtEl=document.getElementById(tgtId);
  var spinEl=document.getElementById('spinner');
  var srcLang=srcId==='ta-ko'?'ko':'vi';
  var src=(srcEl.value||'').trim();

  if(!src){
    srcEl.focus();
    srcEl.style.outline='2px solid var(--vn)';
    setTimeout(function(){srcEl.style.outline='';},1500);
    toast((srcLang==='ko'?'왼쪽 한국어':'오른쪽 베트남어')+'에 텍스트를 입력하세요');
    return;
  }

  tgtEl.value='⏳ 번역 중...';
  if(spinEl) spinEl.style.display='inline-block';

  fetch(LAMBDA,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({mode:'translate',text:src,src_lang:srcLang,tgt_lang:srcLang==='ko'?'vi':'ko'})
  })
  .then(function(res){return res.text().then(function(t){return{s:res.status,t:t};});})
  .then(function(o){
    if(spinEl) spinEl.style.display='none';
    if(o.s===200){
      var d=JSON.parse(o.t);
      tgtEl.value=d.result||o.t;
      updCnt(tgtId==='ta-ko'?'cnt-ko':'cnt-vi',tgtEl.value.length);
      toast('번역 완료! ✅');
    } else {
      tgtEl.value='❌ 오류 (HTTP '+o.s+')\n'+o.t;
    }
  })
  .catch(function(e){
    if(spinEl) spinEl.style.display='none';
    tgtEl.value='❌ 오류: '+e.message;
    toast('번역 오류');
  });
}

// ── 단어 설명 ──
function explainWord(word){
  if(!word||!word.trim()) return;
  word=word.trim();
  document.getElementById('ep-input').value=word;

  var loadEl=document.getElementById('ep-loading');
  var errEl=document.getElementById('ep-error');
  var resEl=document.getElementById('word-result');
  loadEl.className='ep-loading show';
  errEl.className='ep-error';
  resEl.className='word-result';

  // Lambda의 build_explain_prompt가 프롬프트 생성 — 단어만 전달
  fetch(LAMBDA,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({mode:'translate',text:word,src_lang:'ko',tgt_lang:'vi_explain'})
  })
  .then(function(res){return res.text().then(function(t){return{s:res.status,t:t};});})
  .then(function(o){
    loadEl.className='ep-loading';
    if(o.s!==200){
      errEl.textContent='❌ 오류 (HTTP '+o.s+'): '+o.t;
      errEl.className='ep-error show';
      return;
    }
    var data=JSON.parse(o.t);
    var raw=(data.result||o.t).replace(/```json|```/g,'').trim();
    var info;
    try{ info=JSON.parse(raw); }
    catch(e){
      errEl.textContent='❌ 파싱 오류: '+e.message+'\n\n'+raw.slice(0,200);
      errEl.className='ep-error show';
      return;
    }
    renderWordResult(info);
  })
  .catch(function(e){
    loadEl.className='ep-loading';
    errEl.textContent='❌ 오류: '+e.message;
    errEl.className='ep-error show';
  });
}


function renderWordResult(info){
  document.getElementById('wr-ko').textContent=(info.ko||'')+(info.ko_alternatives&&info.ko_alternatives.length?' / '+info.ko_alternatives.join(', '):'');
  document.getElementById('wr-vi').textContent=info.vi||info.word_input||'';
  document.getElementById('wr-ro').textContent=info.pronunciation?'🔊 '+info.pronunciation:'';

  var cats=info.categories||[];
  document.getElementById('wr-cats').innerHTML=cats.map(function(c){
    return '<span class="wcat">'+c+'</span>';
  }).join('');

  var gridHtml='';

  // 단어별 분석 테이블 (핵심)
  if(info.word_breakdown&&info.word_breakdown.length){
    var rows=info.word_breakdown.map(function(w){
      return '<tr>'
        +'<td style="padding:8px 12px;font-weight:700;color:var(--teal3);border-bottom:1px solid var(--border)">'+w.word+'</td>'
        +'<td style="padding:8px 12px;color:var(--txt1);border-bottom:1px solid var(--border)">'+w.meaning+'</td>'
        +'<td style="padding:8px 12px;color:var(--txt2);font-size:11px;border-bottom:1px solid var(--border)">'+(w.note||'')+'</td>'
        +'</tr>';
    }).join('');
    gridHtml+='<div class="wsec" style="grid-column:1/-1">'
      +'<div class="wsec-t">🔍 단어별 분석</div>'
      +'<table style="width:100%;border-collapse:collapse">'
      +'<thead><tr>'
      +'<th style="padding:6px 12px;text-align:left;color:var(--txt2);font-size:11px;border-bottom:2px solid var(--border)">베트남어</th>'
      +'<th style="padding:6px 12px;text-align:left;color:var(--txt2);font-size:11px;border-bottom:2px solid var(--border)">한국어 의미</th>'
      +'<th style="padding:6px 12px;text-align:left;color:var(--txt2);font-size:11px;border-bottom:2px solid var(--border)">참고</th>'
      +'</tr></thead>'
      +'<tbody>'+rows+'</tbody>'
      +'</table></div>';
  }

  // 의미 설명
  if(info.full_meaning)
    gridHtml+='<div class="wsec"><div class="wsec-t">📖 전체 의미</div><p>'+info.full_meaning+'</p></div>';
  if(info.fpcb_meaning)
    gridHtml+='<div class="wsec"><div class="wsec-t">🏭 FPCB 현장 의미</div><p>'+info.fpcb_meaning+'</p></div>';

  // 관련 단어
  if(info.related_words&&info.related_words.length){
    var rwHtml=info.related_words.map(function(w){
      return '<li><b style="color:var(--teal3)">'+w.vi+'</b> → <b>'+w.ko+'</b>'+(w.desc?' <span style="color:var(--txt2);font-size:11px">('+w.desc+')</span>':'')+'</li>';
    }).join('');
    gridHtml+='<div class="wsec"><div class="wsec-t">🔗 관련 단어</div><ul>'+rwHtml+'</ul></div>';
  }

  document.getElementById('wr-grid').innerHTML=gridHtml;

  // 예문
  var exHtml='';
  if(info.examples&&info.examples.length){
    exHtml='<div class="wsec" style="margin-top:12px"><div class="wsec-t">💬 예문 / Ví dụ</div>'
      +info.examples.map(function(e){
        return '<div class="ex-row">'
          +'<div class="ex-vi">🇻🇳 '+e.vi+'</div>'
          +'<div class="ex-ko">🇰🇷 '+e.ko+'</div>'
          +'</div>';
      }).join('')+'</div>';
  }
  document.getElementById('wr-examples').innerHTML=exHtml;

  document.getElementById('word-result').className='word-result show';
  document.getElementById('word-result').scrollIntoView({behavior:'smooth',block:'nearest'});
}


// ── 이벤트 연결 ──
window.addEventListener('load', function(){

  // 번역 버튼
  document.getElementById('btn-trans-ko').addEventListener('click',function(){doTranslate('ta-ko','ta-vi');});
  document.getElementById('btn-trans-vi').addEventListener('click',function(){doTranslate('ta-vi','ta-ko');});
  document.getElementById('btn-dir-ko').addEventListener('click',function(){doTranslate('ta-ko','ta-vi');});
  document.getElementById('btn-dir-vi').addEventListener('click',function(){doTranslate('ta-vi','ta-ko');});

  // 스왑
  document.getElementById('btn-swap').addEventListener('click',function(){
    var ko=document.getElementById('ta-ko').value;
    var vi=document.getElementById('ta-vi').value;
    document.getElementById('ta-ko').value=vi;
    document.getElementById('ta-vi').value=ko;
    updCnt('cnt-ko',vi.length); updCnt('cnt-vi',ko.length);
  });

  // 지우기/복사
  document.getElementById('btn-clear-ko').addEventListener('click',function(){document.getElementById('ta-ko').value='';updCnt('cnt-ko',0);});
  document.getElementById('btn-clear-vi').addEventListener('click',function(){document.getElementById('ta-vi').value='';updCnt('cnt-vi',0);});
  document.getElementById('btn-copy-ko').addEventListener('click',function(){
    var v=document.getElementById('ta-ko').value;
    if(v) navigator.clipboard.writeText(v).then(function(){toast('복사됨!');});
  });
  document.getElementById('btn-copy-vi').addEventListener('click',function(){
    var v=document.getElementById('ta-vi').value;
    if(v) navigator.clipboard.writeText(v).then(function(){toast('복사됨!');});
  });

  // 글자수
  document.getElementById('ta-ko').addEventListener('input',function(){updCnt('cnt-ko',this.value.length);});
  document.getElementById('ta-vi').addEventListener('input',function(){updCnt('cnt-vi',this.value.length);});

  // Ctrl+Enter
  document.getElementById('ta-ko').addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')doTranslate('ta-ko','ta-vi');});
  document.getElementById('ta-vi').addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter')doTranslate('ta-vi','ta-ko');});

  // 단어 설명 버튼
  document.getElementById('btn-explain').addEventListener('click',function(){
    var w=document.getElementById('ep-input').value;
    explainWord(w);
  });
  document.getElementById('ep-input').addEventListener('keydown',function(e){
    if(e.key==='Enter') explainWord(this.value);
  });

  // 설명 복사
  document.getElementById('btn-result-copy').addEventListener('click',function(){
    var ko=document.getElementById('wr-ko').textContent;
    var vi=document.getElementById('wr-vi').textContent;
    var ro=document.getElementById('wr-ro').textContent;
    var def=document.getElementById('wr-grid').textContent;
    navigator.clipboard.writeText(ko+' / '+vi+'\n'+ro+'\n\n'+def).then(function(){toast('설명 복사됨!');});
  });

  // 빠른 단어 버튼 렌더
  var qw=document.getElementById('quick-words');
  qw.innerHTML=QUICK_WORDS.map(function(w){
    return '<button class="qw" data-word="'+w+'">'+w+'</button>';
  }).join('');
  qw.addEventListener('click',function(e){
    if(e.target.dataset.word) explainWord(e.target.dataset.word);
  });
});
</script>
</body>
</html>
