name: 대시보드 자동생성

on:
  push:
    paths: ['data/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install openpyxl
      - run: python generate.py
      - run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add 설비가동율대시보드.html
          git diff --staged --quiet || git commit -m "대시보드 업데이트"
          git push
