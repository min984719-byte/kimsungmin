name: 대시보드 자동생성

on:
  push:
    branches: [ main ]
    paths:
      - 'data/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install openpyxl

      - name: 파일 확인
        run: |
          echo "=== 루트 ===" && ls -la
          echo "=== data ===" && ls -la data/ || echo "data 폴더 없음"

      - name: 대시보드 생성
        run: python generate.py

      - name: 결과 확인
        run: ls -la 설비가동율대시보드.html || echo "생성 실패"

      - name: Git 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 설비가동율대시보드.html
          git diff --staged --quiet || git commit -m "✅ 설비 가동율 대시보드 자동 업데이트"
          git push
